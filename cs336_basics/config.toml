[data]
train_path = "../cs336-data/tinystory/TinyStories-train.txt-tokenized.bin"
valid_path = "../cs336-data/tinystory/TinyStories-valid.txt-tokenized.bin"

[model]
vocab_size = 10000
context_length = 256
d_model = 512
num_layers = 4
num_heads = 16
d_ff = 1344
rope_theta = 10000.0

[optimizer]
lr = 0.001
min_lr = 0.0001
warmup_iters = 100
cosine_cycle_iters = 10000
weight_decay = 0.01

[training]
device = "cpu"
seed = 0
batch_size = 32
max_iters = 10000
log_every = 10
eval_every = 500
eval_iters = 20
checkpoint_every = 1000
checkpoint_dir = "checkpoints"
resume_from = "checkpoints/ckpt_1000.pt"
